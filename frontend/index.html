<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Gestão de Vendas</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Sistema de Gestão de Vendas</h1>
      <p>Organize seus pedidos e calcule vendas facilmente.</p>
      <button id="btnVerPedidos">Ver os Pedidos</button>
    </header>

    <main>
      <section id="secPedidos" style="display: none">
        <h2>Pedidos Realizados</h2>
        <div id="listaDosPedidos"></div>
      </section>

      <section>
        <h2>Catálogo de Produtos</h2>
        <div id="catalogo"></div>
      </section>

      <section>
        <h2>Calculadora de Desconto</h2>

        <p id="produtoSelecionadoInfo"></p>

        <label for="valor">Valor do Produto</label>
        <input type="number" id="valor" readonly />

        <label for="desconto">Desconto (%)</label>
        <input type="number" id="desconto" placeholder="Digite o desconto" />

        <button id="btnCalcular">Calcular</button>

        <p id="resultado"></p>
      </section>

      <section>
        <h2>Buscar Endereço por CEP</h2>

        <label for="cep">CEP</label>
        <input type="text" id="cep" placeholder="Digite o CEP" />

        <button id="btnBuscar">Buscar</button>

        <pre id="resultadoCep"></pre>
      </section>

      <section>
        <h2>Fazer pedido</h2>
        <p>Resumo do pedido</p>
        <pre id="resumoPedido"></pre>
        <button id="btnPedido">FAZER PEDIDO</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
